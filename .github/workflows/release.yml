name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch
      dry_run:
        description: "Dry run: build and notarize, but do not push tag or create GitHub Release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Currently the deployment target is 26.2, so we're pinning to that major
    # os version.
    runs-on: macos-26

    steps:
      - name: Configure runner temp paths
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next tag from bump type
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          latest="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "$latest" ]]; then
            echo "No existing v* tags found; starting from v0.0.0"
            latest="v0.0.0"
          fi
          echo "Latest tag: $latest"

          if [[ ! "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Latest tag '$latest' does not match vMAJOR.MINOR.PATCH; refusing to bump"
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "$BUMP" in
            major) next="v$((major + 1)).0.0" ;;
            minor) next="v${major}.$((minor + 1)).0" ;;
            patch) next="v${major}.${minor}.$((patch + 1))" ;;
            *) echo "::error::Unknown bump type: $BUMP"; exit 1 ;;
          esac

          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "::error::Tag $next already exists locally"
            exit 1
          fi
          if [[ -n "$(git ls-remote --tags origin "refs/tags/$next" 2>/dev/null)" ]]; then
            echo "::error::Tag $next already exists on origin"
            exit 1
          fi

          marketing="${next#v}"
          echo "Next tag:           $next"
          echo "Marketing version:  $marketing"
          {
            echo "next_tag=$next"
            echo "marketing_version=$marketing"
          } >> "$GITHUB_OUTPUT"

      - name: Tag HEAD locally
        env:
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          # Sanity: the script's `git describe --tags` should now find this tag.
          git describe --tags --exact-match HEAD

      - name: Set up signing keychain
        env:
          DEVELOPER_ID_APPLICATION_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          DEVELOPER_ID_INSTALLER_P12: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail

          : "${DEVELOPER_ID_APPLICATION_P12:?secret DEVELOPER_ID_APPLICATION_P12 is empty}"
          : "${DEVELOPER_ID_INSTALLER_P12:?secret DEVELOPER_ID_INSTALLER_P12 is empty}"
          : "${DEVELOPER_ID_P12_PASSWORD:?secret DEVELOPER_ID_P12_PASSWORD is empty}"

          keychain_password="$(openssl rand -hex 32)"

          security create-keychain -p "$keychain_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$keychain_password" "$KEYCHAIN_PATH"

          # Make our keychain visible to codesign/productsign without permanently
          # disturbing the default keychain list.
          existing_keychains=$(security list-keychains -d user | tr -d '"')
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing_keychains

          app_p12="$RUNNER_TEMP/app.p12"
          inst_p12="$RUNNER_TEMP/installer.p12"
          printf '%s' "$DEVELOPER_ID_APPLICATION_P12" | base64 --decode > "$app_p12"
          printf '%s' "$DEVELOPER_ID_INSTALLER_P12"   | base64 --decode > "$inst_p12"
          chmod 600 "$app_p12" "$inst_p12"

          security import "$app_p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security import "$inst_p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/productsign \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$keychain_password" "$KEYCHAIN_PATH" >/dev/null

          # Wipe the .p12 files as soon as the keys are in the keychain.
          rm -fP "$app_p12" "$inst_p12" 2>/dev/null || rm -f "$app_p12" "$inst_p12"

          # Sanity-check that both identities are now visible. Fail early if not.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep -F -q "Developer ID Application: Jonathan Borzilleri (7VW63UWXDW)"; then
            echo "::error::Developer ID Application identity not found in temp keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          if ! security find-identity -v "$KEYCHAIN_PATH" \
              | grep -F -q "Developer ID Installer: Jonathan Borzilleri (7VW63UWXDW)"; then
            echo "::error::Developer ID Installer identity not found in temp keychain"
            security find-identity -v "$KEYCHAIN_PATH" || true
            exit 1
          fi

      - name: Set up notary auth
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail

          : "${APP_STORE_CONNECT_API_KEY_P8:?secret APP_STORE_CONNECT_API_KEY_P8 is empty}"
          : "${APP_STORE_CONNECT_KEY_ID:?secret APP_STORE_CONNECT_KEY_ID is empty}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?secret APP_STORE_CONNECT_ISSUER_ID is empty}"

          umask 077
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          {
            echo "NOTARY_KEY_ID=$APP_STORE_CONNECT_KEY_ID"
            echo "NOTARY_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID"
          } >> "$GITHUB_ENV"

      - name: Build, package, notarize
        env:
          ALLOW_DIRTY: "0"
        run: ./scripts/release.sh

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        env:
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
          MARKETING_VERSION: ${{ steps.bump.outputs.marketing_version }}
        run: |
          set -euo pipefail
          pkg="dist/photos-immich-sync-${MARKETING_VERSION}.pkg"
          if [[ ! -f "$pkg" ]]; then
            echo "::error::Expected pkg not found at $pkg"
            ls -la dist/ || true
            exit 1
          fi
          pkg_size="$(wc -c < "$pkg" | tr -d ' ')"

          {
            echo "## Dry run: no remote changes made"
            echo ""
            echo "- Computed tag: \`$NEXT_TAG\` (not pushed to origin)"
            echo "- Marketing version: \`$MARKETING_VERSION\`"
            echo "- Built pkg: \`$pkg\` (${pkg_size} bytes)"
            echo "- GitHub Release: not created"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Dry run complete."
          echo "  Tag $NEXT_TAG was created locally but NOT pushed to origin."
          echo "  No GitHub Release was created."
          echo "  Built (and notarized) pkg: $pkg (${pkg_size} bytes)"

      - name: Push tag
        if: ${{ !inputs.dry_run }}
        env:
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: git push origin "$NEXT_TAG"

      - name: Create draft release with auto-generated notes
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: |
          gh release create "$NEXT_TAG" \
            --draft \
            --generate-notes \
            --target main \
            --title "$NEXT_TAG"

      - name: Upload pkg asset
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
          MARKETING_VERSION: ${{ steps.bump.outputs.marketing_version }}
        run: |
          set -euo pipefail
          pkg="dist/photos-immich-sync-${MARKETING_VERSION}.pkg"
          if [[ ! -f "$pkg" ]]; then
            echo "::error::Expected pkg not found at $pkg"
            ls -la dist/ || true
            exit 1
          fi
          gh release upload "$NEXT_TAG" "$pkg" --clobber

      - name: Publish release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: gh release edit "$NEXT_TAG" --draft=false

      - name: Cleanup keychain and notary key
        if: always()
        run: |
          set +e
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          if [[ -n "${NOTARY_KEY_PATH:-}" && -f "$NOTARY_KEY_PATH" ]]; then
            rm -fP "$NOTARY_KEY_PATH" 2>/dev/null || rm -f "$NOTARY_KEY_PATH" || true
          fi
          # Best-effort cleanup of any decoded .p12 files that survived a failure
          # in the keychain setup step.
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12" 2>/dev/null || true
          exit 0

      - name: Print remediation on failure
        if: failure()
        env:
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: |
          cat <<EOF
          ::warning::Workflow failed. Tags and Releases have not been deleted.
          Remediate manually if needed:
            gh release delete "$NEXT_TAG" --yes
            git push origin --delete "refs/tags/$NEXT_TAG"
          EOF
