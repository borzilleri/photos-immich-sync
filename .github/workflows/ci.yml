name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags so scripts/generate-version.sh can properly,
          # determine a version.
          fetch-depth: 0
          fetch-tags: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild build \
            -project photos-immich-sync.xcodeproj \
            -scheme "Release Build" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/ci \
            -skipPackagePluginValidation \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

  config-lint:
    name: Validate Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate config_template.yaml
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          python -c "import yaml; yaml.safe_load(open('config_template.yaml')); print('config_template.yaml is valid YAML')"
